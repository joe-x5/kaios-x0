<table class="mtable">
<tr>
<td>
<button id="run" class="items inbut" tabIndex=0 onclick="sendKeyPress6577gt(&apos;Enter&apos;)">Run Banner</button>

</td>
</tr>
</table>


<script>
    function sendKeyPress6577gt(key) {
        let event = new KeyboardEvent("keydown", { key: key });
        document.dispatchEvent(event);
        setTimeout(() => {
            document.dispatchEvent(new KeyboardEvent("keyup", { key: key }));
        }, 100);
    }
</script>
